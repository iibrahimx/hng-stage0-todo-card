<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HNG Stage 0 Todo Card</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="page">
      <h1 class="page-title">Todo Item Card</h1>

      <article id="todo-card" class="todo-card" data-testid="test-todo-card">
        <div class="todo-main">
          <div class="todo-toggle">
            <input
              type="checkbox"
              id="todo-complete"
              data-testid="test-todo-complete-toggle"
            />
            <label for="todo-complete">Mark task as complete</label>
          </div>

          <div class="todo-content">
            <h2 class="todo-title" data-testid="test-todo-title">
              Prepare notes for Monday's team check-in
            </h2>

            <div class="todo-description-wrapper">
              <div
                class="todo-collapsible-section"
                id="todo-collapsible-section"
                data-testid="test-todo-collapsible-section"
              >
                <p class="todo-description" data-testid="test-todo-description">
                  Review last week's progress, write down key updates, and list
                  any blockers to share during the team check-in meeting.
                </p>
              </div>

              <button
                class="expand-toggle"
                type="button"
                aria-expanded="false"
                aria-controls="todo-collapsible-section"
                data-testid="test-todo-expand-toggle"
              >
                Show more
              </button>
            </div>

            <div class="todo-meta">
              <div class="todo-badges">
                <span
                  class="priority-indicator"
                  aria-hidden="true"
                  data-testid="test-todo-priority-indicator"
                ></span>

                <span
                  class="badge priority-badge"
                  data-testid="test-todo-priority"
                >
                  Medium
                </span>

                <span class="badge status-badge" data-testid="test-todo-status">
                  Pending
                </span>
              </div>

              <div class="todo-status-control-group">
                <label for="todo-status-control">Task status</label>
                <select
                  id="todo-status-control"
                  class="todo-status-control"
                  data-testid="test-todo-status-control"
                >
                  <option value="Pending" selected>Pending</option>
                  <option value="In Progress">In Progress</option>
                  <option value="Done">Done</option>
                </select>
              </div>
            </div>

            <div class="todo-time-info">
              <time
                class="todo-due-date"
                datetime="2026-04-13T18:00:00Z"
                data-testid="test-todo-due-date"
              >
                🗓 Due Apr 13, 2026
              </time>

              <time
                class="todo-time-remaining"
                data-testid="test-todo-time-remaining"
                aria-live="polite"
              >
                Due in 3 days
              </time>

              <span
                class="todo-overdue-indicator"
                data-testid="test-todo-overdue-indicator"
                aria-live="polite"
              ></span>
            </div>
          </div>
        </div>

        <div class="todo-footer">
          <ul class="todo-tags" data-testid="test-todo-tags">
            <li class="tag" data-testid="test-todo-tag-work">work</li>
            <li class="tag" data-testid="test-todo-tag-urgent">urgent</li>
            <li class="tag">planning</li>
            <li class="tag">meeting</li>
          </ul>

          <div class="todo-actions">
            <button
              class="action-button edit-button"
              type="button"
              data-testid="test-todo-edit-button"
            >
              ✏️ Edit
            </button>
            <button
              class="action-button delete-button"
              type="button"
              data-testid="test-todo-delete-button"
            >
              🗑 Delete
            </button>
          </div>
        </div>

        <form
          class="todo-edit-form hidden"
          data-testid="test-todo-edit-form"
          aria-label="Edit todo task"
        >
          <div class="form-group">
            <label for="todo-edit-title">Title</label>
            <input
              id="todo-edit-title"
              name="title"
              type="text"
              value="Prepare notes for Monday's team check-in"
              data-testid="test-todo-edit-title-input"
            />
          </div>

          <div class="form-group">
            <label for="todo-edit-description">Description</label>
            <textarea
              id="todo-edit-description"
              name="description"
              rows="4"
              data-testid="test-todo-edit-description-input"
            >
Review last week's progress, write down key updates, and list any blockers to share during the team check-in meeting.</textarea
            >
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="todo-edit-priority">Priority</label>
              <select
                id="todo-edit-priority"
                name="priority"
                data-testid="test-todo-edit-priority-select"
              >
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
              </select>
            </div>

            <div class="form-group">
              <label for="todo-edit-due-date">Due date</label>
              <input
                id="todo-edit-due-date"
                name="dueDate"
                type="datetime-local"
                value="2026-04-13T18:00"
                data-testid="test-todo-edit-due-date-input"
              />
            </div>
          </div>

          <div class="todo-edit-actions">
            <button
              class="action-button edit-button"
              type="submit"
              data-testid="test-todo-save-button"
            >
              Save
            </button>

            <button
              class="action-button delete-button"
              type="button"
              data-testid="test-todo-cancel-button"
            >
              Cancel
            </button>
          </div>
        </form>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
